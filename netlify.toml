# netlify.toml — Passd-AI
# Serves static HTML from repo root, no build step needed.

[build]
  publish = "."

# 1. Force HTTP → HTTPS (fixes the 5xx server error in GSC)
[[redirects]]
  from = "http://passd-ai.co.uk/*"
  to   = "https://passd-ai.co.uk/:splat"
  status = 301
  force = true

# 2. Force www → non-www
[[redirects]]
  from = "https://www.passd-ai.co.uk/*"
  to   = "https://passd-ai.co.uk/:splat"
  status = 301
  force = true

# 3. Force HTTP www → HTTPS non-www
[[redirects]]
  from = "http://www.passd-ai.co.uk/*"
  to   = "https://passd-ai.co.uk/:splat"
  status = 301
  force = true

# 4. SPA routing — all unknown paths serve index.html
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml; charset=utf-8"
