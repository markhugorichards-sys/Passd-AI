# netlify.toml — Passd-AI
# Your site is a static HTML file — no build step needed.
# Netlify serves it directly from the repo root.

[build]
  publish = "."        # serve from repo root, not dist/

# No build command — the HTML is already built

# SPA-style routing fallback (keeps clean URLs working)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security + cache headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
