  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "How do I find a driving instructor near me?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Enter your postcode on Passd-AI to instantly see DVSA-approved driving instructors available in your area, ranked by pass rate, price and availability."
        }
      },
      {
        "@type": "Question",
        "name": "How do I compare driving instructors?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Passd-AI shows you each instructor's verified pass rate, hourly rate, availability, transmission type and learner reviews side by side so you can make the best choice."
        }
      },
      {
        "@type": "Question",
        "name": "Are driving instructors on Passd-AI DVSA approved?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. All instructors listed on Passd-AI are verified against the DVSA ADI register before their profile is approved and published."
        }
      },
      {
        "@type": "Question",
        "name": "Is Passd-AI free for learner drivers?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Passd-AI is completely free for learner drivers to search, compare and contact driving instructors. No account or payment is ever required."
        }
      },
      {
        "@type": "Question",
        "name": "What is a good pass rate for a driving instructor?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "The UK national average first-time pass rate is around 48%. A driving instructor with a pass rate above 60% is considered strong. Passd-AI displays each instructor's verified pass rate so you can compare directly."
        }
      },
      {
        "@type": "Question",
        "name": "How much do driving lessons cost in the UK?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Driving lesson prices in the UK typically range from £30 to £50 per hour depending on location. Passd-AI shows you each instructor's hourly rate upfront so there are no surprises."
        }
      },
      {
        "@type": "Question",
        "name": "Can I find an automatic driving instructor on Passd-AI?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. You can filter results by manual or automatic transmission, as well as intensive courses, nervous driver support and accessibility requirements."
        }
      }
    ]
  }
  </script>
