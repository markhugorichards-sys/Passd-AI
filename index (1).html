<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#f0f2f5;color:#0f1724;min-height:100svh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
img{display:block;max-width:100%}
button,input,select,textarea{font-family:inherit}
:root{
  --navy:#0a1628;--navy2:#112240;
  --blue:#1d6ff3;--bluek:#1558cc;--bluel:#e8f0fd;--bluell:#f4f7fe;
  --green:#16a34a;--greenl:#dcfce7;
  --amber:#d97706;--amberl:#fef3c7;
  --red:#dc2626;--redl:#fee2e2;
  --border:#e2e8f0;--borderl:#f1f5f9;
  --tx:#0f1724;--tx2:#475569;--tx3:#94a3b8;--tx4:#cbd5e1;
  --surface:#ffffff;--bg:#f0f2f5;
  --safe-b:env(safe-area-inset-bottom,0px);
  --tab-h:60px;

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:0 20px;height:48px;border-radius:12px;font-size:15px;font-weight:600;border:none;cursor:pointer;transition:all .15s;white-space:nowrap;-webkit-user-select:none;user-select:none;text-decoration:none;letter-spacing:-.01em}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.btn-p{background:var(--blue);color:#fff;box-shadow:0 1px 3px rgba(29,111,243,.3)}
.btn-p:active{background:var(--bluek)}
.btn-g{background:var(--green);color:#fff}
.btn-gh{background:var(--surface);color:var(--tx2);border:1.5px solid var(--border)}
.btn-gh:active{border-color:var(--blue);color:var(--blue)}
.btn-sm{height:38px;padding:0 14px;font-size:13px;border-radius:9px}
.btn-full{width:100%}
.btn-lg{height:54px;font-size:16px;font-weight:700;border-radius:14px}
/* INPUTS */
.inp,.sel{width:100%;height:48px;padding:0 14px;border:1.5px solid var(--border);border-radius:12px;font-size:16px;color:var(--tx);background:var(--surface);outline:none;-webkit-appearance:none;transition:border-color .15s}
.inp:focus,.sel:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,111,243,.12)}
.inp::placeholder{color:var(--tx3)}
textarea.inp{height:auto;padding:14px;resize:none}
.sel option{background:var(--surface)}
/* CHIPS */
.chip{display:inline-flex;align-items:center;padding:4px 10px;border-radius:99px;font-size:12px;font-weight:600;gap:4px}
.chip-b{background:var(--bluel);color:var(--bluek)}
.chip-g{background:var(--greenl);color:#15803d}
.chip-a{background:var(--amberl);color:var(--amber)}
.chip-r{background:var(--redl);color:var(--red)}
.chip-n{background:var(--bg);color:var(--tx2);border:1px solid var(--border)}
/* CARDS */
.card{background:var(--surface);border-radius:16px;overflow:hidden}
.card-p{padding:20px}
/* TOGGLE */
.tog{position:relative;width:48px;height:28px;flex-shrink:0}
.tog input{opacity:0;position:absolute;width:0;height:0}
.tog-t{position:absolute;inset:0;background:var(--border);border-radius:99px;cursor:pointer;transition:background .2s}
.tog-t::before{content:'';position:absolute;width:22px;height:22px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog input:checked~.tog-t{background:var(--blue)}
.tog input:checked~.tog-t::before{transform:translateX(20px)}
/* RANGE */
input[type=range]{width:100%;height:4px;-webkit-appearance:none;background:var(--border);border-radius:99px;cursor:pointer;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--blue);border:3px solid #fff;box-shadow:0 0 0 1px var(--blue);cursor:grab}
/* PROGRESS */
.prog{height:5px;background:var(--borderl);border-radius:99px;overflow:hidden}
.prog-f{height:100%;background:var(--blue);border-radius:99px;transition:width .4s}
/* STARS */
.stars{display:inline-flex;gap:1px;color:#f59e0b}
/* AVAIL */
.avdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.av-g{background:#16a34a;box-shadow:0 0 5px rgba(22,163,74,.4)}
.av-a{background:#d97706}
.av-r{background:#dc2626}
/* HEADER */
.hdr{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{display:flex;align-items:center;cursor:pointer;gap:0;-webkit-user-select:none;user-select:none}
.logo-m{font-size:22px;font-weight:900;color:var(--navy);letter-spacing:0em;line-height:1}
.logo-b{font-size:10px;font-weight:700;color:var(--blue);letter-spacing:.08em;text-transform:uppercase;margin-left:8px;background:var(--bluel);padding:2px 8px;border-radius:5px;line-height:1.4}
/* BOTTOM TAB BAR */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-b);height:calc(var(--tab-h) + var(--safe-b))}
.tbi{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;color:var(--tx3);font-size:10px;font-weight:600;letter-spacing:.02em;padding:6px 4px;transition:color .15s;min-height:48px}
.tbi.on{color:var(--blue)}
.tbi svg{width:22px;height:22px;flex-shrink:0}
/* PAGE BODY */
.page{padding-bottom:calc(var(--tab-h) + var(--safe-b) + 16px)}

.sh-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;animation:fi .2s ease}
.sh{position:fixed;bottom:0;left:0;right:0;z-index:201;background:var(--surface);border-radius:20px 20px 0 0;max-height:85svh;display:flex;flex-direction:column;animation:su .3s cubic-bezier(.22,.68,0,1.1)}
.sh-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sh-foot{padding:12px 20px calc(12px + var(--tab-h) + var(--safe-b));border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;box-shadow:0 -4px 20px rgba(0,0,0,.08)}
.sh-hd{display:flex;justify-content:space-between;align-items:center;padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.sh-bd{padding:20px}
.sh-bar{width:36px;height:4px;background:var(--border);border-radius:99px;margin:12px auto 0}
/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:flex-end;animation:fi .2s ease}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:85svh;overflow-y:auto;padding-bottom:calc(16px + var(--tab-h) + var(--safe-b));z-index:301;position:relative;animation:su .3s cubic-bezier(.22,.68,0,1.1)}
.modal-hd{display:flex;justify-content:space-between;align-items:center;padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.modal-bd{padding:20px}
.xbtn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg);color:var(--tx2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
/* ANIMATIONS */
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{transform:translateY(100%)}to{transform:none}}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes sh{0%{background-position:-400px 0}100%{background-position:400px 0}}
.fu{animation:fu .3s cubic-bezier(.22,.68,0,1.2) both}
/* SKELETON */
.sk{background:linear-gradient(90deg,var(--bg) 25%,#e2e8f0 50%,var(--bg) 75%);background-size:400px 100%;animation:sh 1.4s infinite;border-radius:8px}
/* CALLOUT */
.cl{padding:14px 16px;border-radius:12px;border-left:3px solid;font-size:14px;line-height:1.6}
.cl-b{background:var(--bluell);border-color:var(--blue);color:var(--bluek)}
.cl-g{background:var(--greenl);border-color:var(--green);color:#15803d}
.cl-a{background:var(--amberl);border-color:var(--amber);color:var(--amber)}
/* SECTION LABEL */
.slbl{font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
/* DIVIDER */
.dvdr{height:1px;background:var(--border);margin:16px 0}
/* BENCH BADGE */
.bench{display:inline-flex;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:700;margin-top:4px}
.b-lo{background:var(--greenl);color:#15803d}
.b-hi{background:var(--redl);color:var(--red)}
.b-av{background:var(--bg);color:var(--tx3)}

.auth-wrap{min-height:60svh;display:flex;align-items:center;justify-content:center;padding:24px 16px}
.auth-card{width:100%;max-width:400px;background:var(--surface);border-radius:20px;padding:28px 24px}
/* FIELD */
.field{display:flex;flex-direction:column;gap:6px}
.lbl{font-size:12px;font-weight:600;color:var(--tx2)}
/* ROW */
.row{display:flex;justify-content:space-between;align-items:center;gap:12px}
/* SECTION */
.section{padding:0 16px}
/* FILTER ROW */
.frow{padding:14px 0;border-bottom:1px solid var(--borderl);display:flex;flex-direction:column;gap:8px}
.frow:last-child{border-bottom:none}
/* NAV MENU */
.nmenu{position:fixed;bottom:calc(var(--tab-h) + var(--safe-b));left:0;right:0;z-index:150;background:var(--surface);border-radius:20px 20px 0 0;border-top:1px solid var(--border);box-shadow:0 -8px 40px rgba(0,0,0,.15);animation:su .25s cubic-bezier(.22,.68,0,1.1)}
.nmenu-item{display:flex;align-items:center;gap:14px;width:100%;padding:16px 20px;background:none;border:none;cursor:pointer;border-bottom:1px solid var(--borderl);text-align:left}
.nmenu-item:last-child{border-bottom:none}
/* INST CARD */
.ic{background:var(--surface);border-radius:16px;overflow:hidden;margin-bottom:12px;cursor:pointer;transition:transform .15s}
.ic:active{transform:scale(.99)}
.ic-body{padding:16px}
.ic-top{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.ic-av{width:56px;height:56px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid var(--borderl)}
.ic-name{font-size:17px;font-weight:700;letter-spacing:-.02em;margin-bottom:3px;color:var(--tx)}
.ic-meta{font-size:13px;color:var(--tx2);display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px}
.ic-chips{display:flex;gap:5px;flex-wrap:wrap}

.mstrip{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;border-top:1px solid var(--borderl);border-bottom:1px solid var(--borderl)}
.mbox{padding:10px 4px 8px;text-align:center;border-right:1px solid var(--borderl);display:flex;flex-direction:column;align-items:center;justify-content:center}

.prof-cost{background:rgba(29,111,243,.15);border-top:1px solid rgba(29,111,243,.3);padding:14px 16px}

.qopt{width:100%;text-align:left;padding:14px 16px;margin-bottom:8px;border:1.5px solid var(--border);border-radius:12px;background:var(--surface);font-size:15px;color:var(--tx);cursor:pointer;display:flex;justify-content:space-between;align-items:center;min-height:52px;font-family:inherit}

.plan{border:2px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px}

/* ADMIN */

/* STAT CARD */
.stat-card{background:var(--surface);border-radius:14px;padding:16px;flex:1}
.stat-n{font-size:26px;font-weight:800;letter-spacing:-.03em;margin-top:4px;line-height:1}

/* PRICE BAR */
.pbars{display:flex;gap:4px;align-items:flex-end;height:40px;margin-bottom:6px}
.pb{flex:1;border-radius:3px 3px 0 0;background:var(--bluel);min-height:4px}

/* COOKIE */
.cookie{position:fixed;bottom:calc(var(--tab-h) + var(--safe-b) + 8px);left:8px;right:8px;z-index:150;background:var(--navy);color:#fff;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.3);font-size:13px}
</style>

        try{
          const {latitude:lat,longitude:lng}=pos.coords;
          const res=await fetch('https://api.postcodes.io/postcodes?lon='+lng+'&lat='+lat+'&limit=1');
          const data=await res.json();
          if(data.result&&data.result[0]){
            const p=data.result[0].postcode;
            setPc(p);
            setLocLoading(false);
            setTimeout(()=>formRef.current?.querySelector('form')?.requestSubmit()||onSearch({postcode:p,exp,tx}),100);

            setLocErr('Could not find postcode for your location');
            setLocLoading(false);
          }
        }catch(e){
          setLocErr('Location lookup failed — enter your postcode manually');
          setLocLoading(false);
        }
      },
      err=>{
        setLocErr(err.code===1?'Location access denied — enter your postcode below':'Could not get your location');

const Compare=({insts,sp,isGuest,onNav,onProfile,onBook})=>{
  const [sort,setSort]=useState('ps');
  const [filterOpen,setFO]=useState(false);
  const [maxRate,setMR]=useState(60);
  const [tx,setTx]=useState(sp?.tx||'Any');
  const [gender,setG]=useState('Any');
  const [ltype,setLt]=useState('Any');
  const [specs,setSpecs]=useState([]);
  const [verOnly,setVO]=useState(false);
  const [loading,setLoad]=useState(true);
  useEffect(()=>{const t=setTimeout(()=>setLoad(false),600);return()=>clearTimeout(t);},[sp]);
  const pc=sp?.postcode||'';
  const exp=sp?.exp||'Complete Beginner';
  const hrs=HRS[exp]||47;
  const ravg=RAVG(pc);
  const togSpec=s=>setSpecs(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s]);
  const reset=()=>{setTx('Any');setG('Any');setLt('Any');setVO(false);setMR(60);setSpecs([]);};
  const activeF=[tx!=='Any',gender!=='Any',ltype!=='Any',verOnly,...specs.map(()=>true)].filter(Boolean).length;

  const results=useMemo(()=>{
    let r=insts.filter(i=>(tx==='Any'||i.tx.includes(tx))&&(gender==='Any'||i.gender===gender)&&(ltype==='Any'||i.types.includes(ltype))&&(!verOnly||i.verified)&&i.rate<=maxRate&&(specs.length===0||specs.every(s=>i.support.includes(s)))).map(i=>({...i,total:i.rate*hrs,ps:calcPS(i)}));
    switch(sort){case 'rate':return r.sort((a,b)=>a.rate-b.rate);case 'total':return r.sort((a,b)=>a.total-b.total);case 'pass':return r.sort((a,b)=>b.passRate-a.passRate);case 'rating':return r.sort((a,b)=>b.rating-a.rating);default:return r.sort((a,b)=>b.ps-a.ps);}
  },[insts,tx,gender,ltype,verOnly,maxRate,specs,sort,hrs]);

  const maxSave=results.length>1?results[results.length-1].total-results[0].total:0;

  return<div className="page">

    {/* Context banner — tells learner exactly what they're looking at */}

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,marginBottom:8}}>

          <div style={{fontSize:16,fontWeight:800,color:'#fff',letterSpacing:'-.01em'}}>
            {results.length} instructors
            {pc&&<span style={{color:'rgba(255,255,255,.5)',fontWeight:500,fontSize:14}}> near {pc}</span>}
          </div>
          <div style={{fontSize:12,color:'rgba(255,255,255,.45)',marginTop:3}}>
            {exp||'Complete Beginner'} · approx {hrs} hrs to pass

        </div>
        {maxSave>50&&(

            <div style={{fontSize:15,fontWeight:900,color:'#4fffb0',lineHeight:1}}>£{Math.round(maxSave)}</div>
            <div style={{fontSize:10,color:'rgba(255,255,255,.5)',fontWeight:600,marginTop:2}}>max saving</div>
          </div>
        )}
      </div>
      {/* Sort pills inside navy banner */}
      <div style={{display:'flex',gap:6,overflowX:'auto',scrollbarWidth:'none',paddingBottom:2}}>
        <button className="filt-btn" style={{flexShrink:0,height:32,padding:'0 12px',fontSize:12}} onClick={()=>setFO(true)}>
          {Ic.filter}

            ?<span style={{marginLeft:4,background:'#fff',color:'var(--blue)',borderRadius:99,fontSize:10,fontWeight:800,padding:'1px 5px'}}>{activeF}</span>

          }}>{l}</button>

      </div>
    </div>

    {/* How we rank explainer — shown once, dismissable */}

        {sort==='rating'&&' Sorted by learner star rating.'}

    </div>

    {/* Cards */}
    <div style={{padding:'0 16px'}}>

           {idx===0&&sort==='rate'&&<div style={{background:'var(--green)',color:'#fff',fontSize:11,fontWeight:800,letterSpacing:'.05em',textTransform:'uppercase',padding:'6px 14px',display:'flex',alignItems:'center',gap:6}}><span style={{width:6,height:6,borderRadius:'50%',background:'rgba(255,255,255,.6)',flexShrink:0}}/> Cheapest in your area</div>}
           {idx===0&&sort==='pass'&&<div style={{background:'#7c3aed',color:'#fff',fontSize:11,fontWeight:800,letterSpacing:'.05em',textTransform:'uppercase',padding:'6px 14px',display:'flex',alignItems:'center',gap:6}}><span style={{width:6,height:6,borderRadius:'50%',background:'rgba(255,255,255,.6)',flexShrink:0}}/> Highest pass rate</div>}
           {inst.tier==='Premium'&&idx>0&&<div style={{background:'var(--bg)',color:'var(--tx3)',fontSize:10,fontWeight:700,padding:'3px 12px',textAlign:'right',letterSpacing:'.04em'}}>SPONSORED</div>}

           <div className="ic-body" onClick={()=>onProfile(inst.id)}>
             <div className="ic-top">
               <img src={inst.avatar} alt={inst.name} className="ic-av" loading="lazy" onError={e=>e.target.style.display='none'}/>
               <div style={{flex:1,minWidth:0}}>
                 <div className="ic-name">{inst.name}</div>
                 <div className="ic-meta">
                   <Stars r={inst.rating}/><span style={{fontWeight:700,fontSize:13}}>{inst.rating}</span><span style={{fontSize:12,color:'var(--tx3)'}}>({inst.reviews})</span>

                   <span style={{fontSize:12,color:'var(--tx2)',display:'flex',alignItems:'center',gap:3}}>{Ic.pin} {inst.area} · {inst.dist.toFixed(1)} mi</span>
                   {saving>80&&<span className="save-p" style={{fontSize:11,padding:'3px 8px'}}>Save £{Math.round(saving)}</span>}
                 </div>
               </div>
             </div>
           </div>

           {/* 4-stat strip */}
           <div className="mstrip">
             <div className="mbox">
               <div className={`mnum ${pCls}`}>£{inst.rate}</div>
               <div className="mlbl">Per hour</div>
             </div>
             <div className="mbox">
               <div className="mnum mnum-b" style={{fontSize:inst.total>=1000?13:17}}>£{inst.total.toLocaleString()}</div>
               <div className="mlbl">Est. total</div>
             </div>
             <div className="mbox">
               <div className={`mnum ${inst.passRate>=90?'mnum-g':inst.passRate>=80?'mnum-b':'mnum-a'}`}>{inst.passRate}%</div>
               <div className="mlbl">Pass rate</div>
             </div>
             <div className="mbox">
               <div className="mnum" style={{color:sc,fontWeight:900}}>{inst.ps}</div>
               <div className="mlbl" style={{color:sc,fontWeight:700}}>PassScore</div>
             </div>
           </div>
           {/* Bench below strip — doesn't disturb grid height */}
           <div style={{padding:'5px 12px 2px',display:'flex',alignItems:'center',gap:6}}>
             <Bench rate={inst.rate} avg={ravg}/>
             {inst.avail==='Available'&&<span style={{fontSize:11,color:'var(--green)',fontWeight:600,display:'flex',alignItems:'center',gap:3,marginLeft:4}}><AvDot s="Available"/> Available</span>}
             {inst.avail!=='Available'&&<span style={{fontSize:11,color:'var(--amber)',fontWeight:600,display:'flex',alignItems:'center',gap:3,marginLeft:4}}><AvDot s={inst.avail}/> {inst.avail}</span>}
           </div>

           <div className="ic-acts">
             <button className="btn btn-p btn-full" style={{height:48}} onClick={e=>{e.stopPropagation();onBook(inst);}}>Book lesson</button>
             <button className="btn btn-gh" style={{height:48,padding:'0 16px',flexShrink:0}} onClick={e=>{e.stopPropagation();onProfile(inst.id);}}>{Ic.arR}</button>
           </div>
         </div>;

         if(locked)return<div key={`g${inst.id}`} className="gate">
           <div className="gate-blur">{card}</div>
           <div className="gate-panel">
             <div style={{marginBottom:8}}>{Ic.lock}</div>
             <div style={{fontWeight:800,fontSize:18,marginBottom:6}}>See all {results.length} results</div>
             <p style={{fontSize:14,color:'var(--tx2)',marginBottom:16,lineHeight:1.5}}>Sign up free to unlock the full comparison.</p>
             <button className="btn btn-p btn-full btn-lg" onClick={()=>onNav('signup')}>Unlock free</button>

        {insts.filter(i=>!i.verified).length===0&&<p style={{fontSize:14,color:'var(--tx3)'}}>No pending verifications.</p>}

/* ── APP ── */
const App=()=>{
  const [view,setView]=useState('home');
  const [insts,setInsts]=useState(INSTS);
  const [learners,setLearners]=useState(LEARNERS);
  const [sp,setSp]=useState(null);
  const [selId,setSelId]=useState(null);
  const [lu,setLu]=useState(null);
  const [iu,setIu]=useState(null);
  const [admin,setAdmin]=useState(false);
  const [bookI,setBookI]=useState(null);
  const [topics,setTopics]=useState(THEORY);
  const [mockLeft,setMockLeft]=useState(3);
  const [cookie,setCookie]=useState(()=>{try{return localStorage.getItem('pp_c');}catch(e){return null;}});
  const [menuOpen,setMenuOpen]=useState(false);
  const [autoScroll,setAutoScroll]=useState(false);
  const [lc,setLc]=useState(0);

  const nav=useCallback(v=>{window.scrollTo(0,0);setMenuOpen(false);if(v==='dashboard'&&!lu){setView('login');return;}setView(v);},[lu]);

  const handleLogin=(t,u)=>{if(t==='inst'){setIu(u);nav('portal');}else{setLu(u);nav('dashboard');}};
  const render=()=>{
    if(admin&&view==='admin')return<Admin insts={insts} learners={learners} onApprove={id=>setInsts(p=>p.map(i=>i.id===id?{...i,verified:true}:i))} onLogout={()=>{setAdmin(false);nav('home');}}/>;
    if(view==='adminLogin')return<AdminLogin onLogin={()=>{setAdmin(true);setView('admin');}}/>;
    switch(view){
      case 'home':      return<Home onNav={nav} onSearch={p=>{setSp(p);nav('compare');}} autoScroll={autoScroll} onScrolled={()=>setAutoScroll(false)}/>;
      case 'compare':   return<Compare insts={insts} sp={sp} isGuest={!lu} onNav={nav} onProfile={id=>{setSelId(id);nav('profile');}} onBook={i=>setBookI(i)}/>;
      case 'profile':   {const i=insts.find(x=>x.id===selId);return i?<Profile inst={i} exp={sp?.exp} pc={sp?.postcode} isGuest={!lu} onBack={()=>nav('compare')} onBook={i=>setBookI(i)} onNav={nav}/>:<Home onNav={nav} onSearch={p=>{setSp(p);nav('compare');}}/>;}
      case 'theory':    return<Theory topics={topics} setTopics={setTopics} mockLeft={mockLeft} setMockLeft={setMockLeft} isGuest={!lu} onNav={nav}/>;
      case 'dashboard': return lu?<Dashboard learner={lu} onNav={nav}/>:<Login onLogin={handleLogin} onNav={nav} insts={insts}/>;
      case 'login':     return<Login onLogin={handleLogin} onNav={nav} insts={insts}/>;
      case 'signup':    return<Signup onSignup={(name,email)=>{const u={...LEARNERS[0],id:99,name,email};setLearners(p=>[...p,u]);setLu(u);nav('compare');}} onNav={nav}/>;
      case 'portal':    return iu?<Portal inst={iu} onUpdate={u=>{setInsts(p=>p.map(i=>i.id===u.id?u:i));setIu(u);}} onLogout={()=>{setIu(null);nav('home');}}/>:<Login onLogin={handleLogin} onNav={nav} insts={insts}/>;
      case 'instructors':return<ForInstructors onNav={nav}/>;
      case 'legal':     return<LegalHub onNav={nav}/>;
      case 'legal_privacy':            return<Legal page="privacy" onBack={()=>nav('legal')}/>;
      case 'legal_terms':              return<Legal page="terms" onBack={()=>nav('legal')}/>;
      case 'legal_cookies':            return<Legal page="cookies" onBack={()=>nav('legal')}/>;
      case 'legal_instructor_agreement':return<Legal page="instructor_agreement" onBack={()=>nav('legal')}/>;
      default:          return<Home onNav={nav} onSearch={p=>{setSp(p);nav('compare');}}/>;
    }
  };

  const isPortal=['portal','admin'].includes(view)&&(iu||admin);
  const TAB_ITEMS=[
    {v:'home',l:'Home',icon:Ic.home},
    {v:'compare',l:'Compare',icon:Ic.compare},
    {v:'theory',l:'Theory',icon:Ic.theory},
    {v:lu?'dashboard':iu?'portal':'login',l:lu||iu?'Account':'Sign in',icon:Ic.user},
    {v:'__more__',l:'More',icon:Ic.more},
  ];

  const logoClick=()=>{const n=lc+1;setLc(n);if(n>=5){nav('adminLogin');setLc(0);}else nav('home');};

  return<>
    {/* Header */}
    <div className="hdr">
      {/* Logo + tagline */}
      <div style={{display:'flex',flexDirection:'column',gap:0,cursor:'pointer'}} onClick={logoClick}>
        <div style={{display:'flex',alignItems:'baseline',gap:0}}>
          <span className="logo-m">Passd<span style={{color:'var(--blue)'}}>.</span></span>
        </div>
        {!lu&&!iu&&view==='home'&&(
          <span style={{fontSize:11,color:'var(--tx3)',fontWeight:500,letterSpacing:'-.01em',marginTop:1,lineHeight:1}}>
            Compare driving instructors
          </span>
        )}
        {(view==='compare'||view==='profile')&&(
          <span style={{fontSize:11,color:'var(--blue)',fontWeight:600,letterSpacing:'-.01em',marginTop:1,lineHeight:1}}>
            Price · Pass rate · Total cost
          </span>
        )}
      </div>
      {/* Right side — context aware */}
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        {lu
          ?<><span style={{fontSize:13,fontWeight:600,color:'var(--tx2)',maxWidth:80,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>Hi, {lu.name.split(' ')[0]}</span><button className="btn btn-gh btn-sm" onClick={()=>{setLu(null);nav('home');}}>Sign out</button></>
          :iu
          ?<><span style={{fontSize:13,fontWeight:600,color:'var(--tx2)'}}>Portal</span><button className="btn btn-gh btn-sm" onClick={()=>{setIu(null);nav('home');}}>Sign out</button></>
          :view==='home'
          ?<><button className="btn btn-gh btn-sm" onClick={()=>nav('login')}>Sign in</button><button className="btn btn-p btn-sm" onClick={()=>{setAutoScroll(true);nav('home');}}>Compare free</button></>
          :view==='compare'||view==='profile'
          ?<button className="btn btn-gh btn-sm" onClick={()=>nav('home')}>↩ New search</button>
          :<><button className="btn btn-gh btn-sm" onClick={()=>nav('login')}>Sign in</button><button className="btn btn-p btn-sm" onClick={()=>nav('compare')}>Compare</button></>
        }
      </div>
    </div>

    {/* Page */}
    <div key={view} className="fu">{render()}</div>

    {/* Tab bar */}
    {!isPortal&&<div className="tabbar">
      {TAB_ITEMS.map(({v,l,icon})=>(
        <button key={v} className={`tbi${view===v||(v==='__more__'&&menuOpen)?' on':''}`}
          onClick={v==='__more__'?()=>setMenuOpen(m=>!m):()=>nav(v)}>
          {icon}<span>{l}</span>
        </button>
      ))}
    </div>}

    {/* More menu */}
    {menuOpen&&<>
      <div style={{position:'fixed',inset:0,zIndex:98}} onClick={()=>setMenuOpen(false)}/>
      <div className="nmenu">
        <div style={{width:36,height:4,background:'var(--border)',borderRadius:99,margin:'12px auto 8px'}}/>
        {[
          {v:'instructors',l:'For Instructors',sub:'List your profile, top 3 placement',icon:Ic.instruc},
          {v:'theory',l:'Theory Practice',sub:'DVSA questions, mock tests',icon:Ic.theory},
          {v:'compare',l:'Compare Instructors',sub:'Find the best value near you',icon:Ic.compare},
          {v:lu?'dashboard':iu?'portal':'login',l:lu||iu?'My Account':'Sign in / Sign up',sub:lu?'Progress & bookings':iu?'Portal & subscription':'Free account',icon:Ic.user},
          {v:'legal',l:'Legal & Privacy',sub:'Terms, privacy policy, cookies',icon:Ic.lock},
        ].map(({v,l,sub,icon})=>(
          <button key={v} className="nmenu-item" onClick={()=>nav(v)}>
            <span style={{color:'var(--blue)',flexShrink:0}}>{icon}</span>
            <span style={{flex:1}}>
              <span style={{display:'block',fontWeight:700,fontSize:15,color:'var(--tx)'}}>{l}</span>
              <span style={{display:'block',fontSize:12,color:'var(--tx3)',marginTop:1}}>{sub}</span>
            </span>
            <span style={{color:'var(--tx4)',flexShrink:0}}><Sv d="M9 18l6-6-6-6" s={16}/></span>
          </button>
        ))}
      </div>
    </>}

    {/* Book modal */}
    {bookI&&<BookModal inst={bookI} onClose={()=>setBookI(null)} learner={lu} onNav={nav}/>}

    {/* Cookie */}
    {!cookie&&<div className="cookie">
      <span style={{flex:1,lineHeight:1.5}}>We use cookies. <button onClick={()=>nav('legal_cookies')} style={{background:'none',border:'none',color:'rgba(255,255,255,.7)',cursor:'pointer',textDecoration:'underline',fontSize:'inherit',fontFamily:'inherit'}}>Learn more</button></span>
      <div style={{display:'flex',gap:8,flexShrink:0}}>
        <button className="btn btn-sm" style={{background:'rgba(255,255,255,.15)',color:'#fff',height:36}} onClick={()=>{setCookie('d');try{localStorage.setItem('pp_c','d');}catch(e){}}}>No</button>
        <button className="btn btn-p btn-sm" onClick={()=>{setCookie('a');try{localStorage.setItem('pp_c','a');}catch(e){}}}>Accept</button>
      </div>
    </div>}
  </>;
};
