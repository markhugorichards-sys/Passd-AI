<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PassPal AI — Compare Driving Instructors. Find the Best Value.</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ─── Design Tokens ────────────────────────────────────────────── */
:root {
  --navy:     #0a1628;
  --navy-mid: #112240;
  --navy-light:#1a3355;
  --blue:     #1d6ff3;
  --blue-d:   #1558cc;
  --blue-l:   #e8f0fd;
  --blue-ll:  #f4f7fe;
  --teal:     #0d9488;
  --green:    #16a34a;
  --green-l:  #dcfce7;
  --amber:    #d97706;
  --amber-l:  #fef3c7;
  --red:      #dc2626;
  --red-l:    #fee2e2;
  --white:    #ffffff;
  --off:      #f8f9fc;
  --surface:  #ffffff;
  --border:   #e4e7ef;
  --border-l: #f0f2f8;
  --text:     #0f1724;
  --text-2:   #3d4f6b;
  --text-3:   #7a8aaa;
  --text-4:   #b0bcce;

  /* Type scale — fluid */
  --t-xs:   clamp(10px, 1.1vw, 11px);
  --t-sm:   clamp(12px, 1.3vw, 13px);
  --t-base: clamp(14px, 1.5vw, 15px);
  --t-md:   clamp(15px, 1.7vw, 16px);
  --t-lg:   clamp(17px, 2vw, 19px);
  --t-xl:   clamp(20px, 2.5vw, 24px);
  --t-2xl:  clamp(24px, 3vw, 32px);
  --t-3xl:  clamp(30px, 4vw, 44px);
  --t-4xl:  clamp(36px, 5vw, 58px);

  --r-sm:  6px;
  --r:     10px;
  --r-lg:  16px;
  --r-xl:  22px;

  --shadow-xs: 0 1px 3px rgba(10,22,40,.06), 0 1px 2px rgba(10,22,40,.04);
  --shadow-sm: 0 2px 8px rgba(10,22,40,.07), 0 1px 3px rgba(10,22,40,.05);
  --shadow:    0 4px 20px rgba(10,22,40,.09), 0 2px 6px rgba(10,22,40,.05);
  --shadow-lg: 0 12px 40px rgba(10,22,40,.12), 0 4px 12px rgba(10,22,40,.06);
  --shadow-blue: 0 8px 30px rgba(29,111,243,.22);
}

/* ─── Reset & Base ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: var(--t-base);
  line-height: 1.6;
  color: var(--text);
  background: var(--off);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
img { display: block; max-width: 100%; }
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }

/* ─── Type System ───────────────────────────────────────────────── */
.serif { font-family: 'Instrument Serif', Georgia, serif; }
.t-xs   { font-size: var(--t-xs); }
.t-sm   { font-size: var(--t-sm); }
.t-base { font-size: var(--t-base); }
.t-md   { font-size: var(--t-md); }
.t-lg   { font-size: var(--t-lg); }
.t-xl   { font-size: var(--t-xl); }
.t-2xl  { font-size: var(--t-2xl); }
.t-3xl  { font-size: var(--t-3xl); }
.t-4xl  { font-size: var(--t-4xl); }
.fw-4 { font-weight: 400; }
.fw-5 { font-weight: 500; }
.fw-6 { font-weight: 600; }
.fw-7 { font-weight: 700; }
.c-2 { color: var(--text-2); }
.c-3 { color: var(--text-3); }
.c-blue { color: var(--blue); }
.c-green { color: var(--green); }

/* ─── Layout ────────────────────────────────────────────────────── */
.wrap { max-width: 1140px; margin: 0 auto; padding: 0 24px; }
.wrap-sm { max-width: 720px; margin: 0 auto; padding: 0 24px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
@media (max-width: 900px) { .grid-3 { grid-template-columns: 1fr 1fr; } .grid-4 { grid-template-columns: 1fr 1fr; } }
@media (max-width: 600px) { .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } }

/* ─── Animations ────────────────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: none; }
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes shimmer {
  0%   { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}
.fade-up { animation: fadeUp .35s cubic-bezier(.22,.68,0,1.2) both; }
.fade-in { animation: fadeIn .25s ease both; }
.delay-1 { animation-delay: .06s; }
.delay-2 { animation-delay: .12s; }
.delay-3 { animation-delay: .18s; }
.delay-4 { animation-delay: .24s; }

/* ─── Buttons ───────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  padding: 10px 20px; border-radius: var(--r); font-size: var(--t-sm);
  font-weight: 600; border: none; cursor: pointer;
  transition: all .18s cubic-bezier(.4,0,.2,1); white-space: nowrap; text-decoration: none;
  letter-spacing: .01em;
}
.btn:active { transform: scale(.97); }
.btn-primary {
  background: var(--blue); color: #fff;
  box-shadow: 0 1px 3px rgba(29,111,243,.3);
}
.btn-primary:hover { background: var(--blue-d); box-shadow: var(--shadow-blue); transform: translateY(-1px); }
.btn-navy { background: var(--navy); color: #fff; }
.btn-navy:hover { background: var(--navy-mid); transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--text-2); border: 1.5px solid var(--border); }
.btn-ghost:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-ll); }
.btn-subtle { background: var(--blue-ll); color: var(--blue); }
.btn-subtle:hover { background: var(--blue-l); }
.btn-success { background: var(--green); color: #fff; }
.btn-success:hover { background: #15803d; }
.btn-lg { padding: 13px 28px; font-size: var(--t-md); border-radius: var(--r-lg); }
.btn-sm { padding: 7px 14px; font-size: var(--t-xs); border-radius: var(--r-sm); }
.btn-full { width: 100%; }
.btn:disabled { opacity: .45; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

/* ─── Form Controls ─────────────────────────────────────────────── */
.field { display: flex; flex-direction: column; gap: 5px; }
.label {
  font-size: var(--t-xs); font-weight: 600; color: var(--text-3);
  letter-spacing: .06em; text-transform: uppercase;
}
.input, .select {
  padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--r);
  font-size: var(--t-base); font-family: inherit; background: var(--surface); color: var(--text);
  outline: none; transition: border-color .15s, box-shadow .15s; width: 100%;
  -webkit-appearance: none; appearance: none;
}
.input:focus, .select:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(29,111,243,.12);
}
.input::placeholder { color: var(--text-4); }
textarea.input { resize: vertical; min-height: 90px; }

/* Hero inputs — lighter for dark bg */
.input-hero {
  background: rgba(255,255,255,.08); border: 1.5px solid rgba(255,255,255,.18);
  color: #fff; border-radius: var(--r);
  padding: 11px 14px; font-size: var(--t-base); font-family: inherit;
  outline: none; transition: all .15s; width: 100%;
  -webkit-appearance: none;
}
.input-hero::placeholder { color: rgba(255,255,255,.38); }
.input-hero:focus { border-color: rgba(255,255,255,.5); background: rgba(255,255,255,.13); box-shadow: 0 0 0 3px rgba(255,255,255,.08); }
.input-hero option { background: var(--navy-mid); color: #fff; }

/* ─── Cards ─────────────────────────────────────────────────────── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-lg); box-shadow: var(--shadow-xs);
}
.card-hover { transition: all .2s; }
.card-hover:hover { box-shadow: var(--shadow); transform: translateY(-2px); border-color: var(--border); }
.card-p { padding: 24px; }
.card-p-lg { padding: 32px; }

/* ─── Tags / Chips ───────────────────────────────────────────────── */
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 99px; font-size: var(--t-xs); font-weight: 600;
}
.chip-blue   { background: var(--blue-l); color: var(--blue-d); }
.chip-green  { background: var(--green-l); color: #15803d; }
.chip-amber  { background: var(--amber-l); color: var(--amber); }
.chip-red    { background: var(--red-l); color: var(--red); }
.chip-gray   { background: var(--border-l); color: var(--text-2); }
.chip-navy   { background: var(--navy); color: #c8d8f0; }

/* ─── Toggle ────────────────────────────────────────────────────── */
.toggle-wrap { display: flex; justify-content: space-between; align-items: center; }
.toggle { position: relative; width: 38px; height: 21px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-track {
  position: absolute; inset: 0; background: var(--border);
  border-radius: 99px; transition: background .2s; cursor: pointer;
}
.toggle-track::before {
  content: ''; position: absolute; width: 15px; height: 15px;
  left: 3px; bottom: 3px; background: #fff; border-radius: 50%;
  transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.18);
}
.toggle input:checked ~ .toggle-track { background: var(--blue); }
.toggle input:checked ~ .toggle-track::before { transform: translateX(17px); }

/* ─── Progress bar ───────────────────────────────────────────────── */
.prog { height: 5px; background: var(--border-l); border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 99px; background: var(--blue); transition: width .4s ease; }

/* ─── Divider ────────────────────────────────────────────────────── */
.divider { height: 1px; background: var(--border); margin: 20px 0; }

/* ─── Callout ────────────────────────────────────────────────────── */
.callout { padding: 14px 18px; border-radius: var(--r); border-left: 3px solid; font-size: var(--t-sm); line-height: 1.6; }
.callout-info   { background: var(--blue-ll); border-color: var(--blue); color: #1558cc; }
.callout-success{ background: var(--green-l); border-color: var(--green); color: #15803d; }
.callout-amber  { background: var(--amber-l); border-color: var(--amber); color: var(--amber); }

/* ─── Header ─────────────────────────────────────────────────────── */
#header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,.92); backdrop-filter: blur(20px) saturate(1.6);
  border-bottom: 1px solid var(--border);
  transition: box-shadow .2s;
}
.header-inner {
  height: 58px; display: flex; align-items: center; justify-content: space-between;
}
.logo { display: flex; align-items: baseline; gap: 0; cursor: pointer; }
.logo-main {
  font-family: 'Instrument Serif', serif; font-size: 22px; font-weight: 400;
  color: var(--navy); letter-spacing: -.01em;
}
.logo-dot { color: var(--blue); font-family: 'Instrument Serif', serif; font-size: 22px; }
.logo-sub {
  font-size: var(--t-xs); font-weight: 600; color: var(--blue); letter-spacing: .06em;
  text-transform: uppercase; margin-left: 10px; background: var(--blue-l);
  padding: 2px 8px; border-radius: 4px;
}
.nav { display: flex; align-items: center; gap: 2px; }
.nav-item {
  padding: 6px 13px; border-radius: var(--r-sm); font-size: var(--t-sm); font-weight: 500;
  color: var(--text-2); background: none; border: none; cursor: pointer;
  transition: all .15s;
}
.nav-item:hover { background: var(--off); color: var(--text); }
.nav-item.active { background: var(--blue-ll); color: var(--blue); font-weight: 600; }
.nav-sep { width: 1px; height: 18px; background: var(--border); margin: 0 6px; }

/* ─── Hero ───────────────────────────────────────────────────────── */
.hero {
  background: var(--navy);
  padding: 72px 0 64px;
  position: relative; overflow: hidden;
}
.hero::after {
  content: '';
  position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 80% at 8% 60%, rgba(29,111,243,.14) 0%, transparent 65%),
    radial-gradient(ellipse 40% 60% at 92% 20%, rgba(13,148,136,.10) 0%, transparent 55%);
}
.hero-label {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(29,111,243,.15); border: 1px solid rgba(29,111,243,.25);
  color: #93b4f0; font-size: var(--t-sm); font-weight: 500;
  padding: 5px 14px; border-radius: 99px; margin-bottom: 22px;
}
.hero-label::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--blue); box-shadow: 0 0 8px var(--blue); flex-shrink: 0;
}
.hero h1 {
  font-family: 'Instrument Serif', serif;
  font-size: var(--t-4xl); font-weight: 400; line-height: 1.1;
  color: #fff; letter-spacing: -.02em; margin-bottom: 18px; max-width: 600px;
}
.hero h1 em { color: #93b4f0; font-style: italic; }
.hero-sub {
  font-size: var(--t-md); color: rgba(255,255,255,.52); line-height: 1.65;
  max-width: 480px; margin-bottom: 36px; font-weight: 400;
}

/* ─── Quote Engine ────────────────────────────────────────────────── */
.qe {
  background: rgba(255,255,255,.055);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: var(--r-xl); padding: 28px;
  backdrop-filter: blur(8px); max-width: 700px;
}
.qe-grid { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 14px; align-items: end; }
.qe-label { font-size: var(--t-xs); font-weight: 600; color: rgba(255,255,255,.45); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 6px; }
.qe-trust {
  display: flex; align-items: center; gap: 20px; margin-top: 16px; flex-wrap: wrap;
}
.qe-trust-item {
  font-size: var(--t-xs); color: rgba(255,255,255,.38); display: flex; align-items: center; gap: 6px;
}
.qe-trust-item svg { color: rgba(29,111,243,.7); }
@media(max-width:680px){ .qe-grid { grid-template-columns: 1fr 1fr; } }
@media(max-width:480px){ .qe-grid { grid-template-columns: 1fr; } }

/* ─── Hero stats ─────────────────────────────────────────────────── */
.hero-stats { display: flex; gap: 40px; margin-top: 52px; flex-wrap: wrap; }
.hero-stat-n { font-family: 'Instrument Serif', serif; font-size: clamp(26px,3.5vw,38px); color: #fff; line-height: 1; }
.hero-stat-l { font-size: var(--t-xs); color: rgba(255,255,255,.4); margin-top: 4px; letter-spacing: .04em; text-transform: uppercase; }

/* ─── Compare toolbar ────────────────────────────────────────────── */
.compare-bar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  position: sticky; top: 58px; z-index: 80; padding: 10px 0;
}
.compare-bar-inner { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
.sort-group { display: flex; gap: 6px; flex-wrap: wrap; }
.sort-btn {
  padding: 6px 13px; border-radius: 99px; font-size: var(--t-xs); font-weight: 600;
  cursor: pointer; border: 1.5px solid var(--border); background: var(--surface); color: var(--text-2);
  transition: all .15s;
}
.sort-btn:hover { border-color: var(--blue); color: var(--blue); }
.sort-btn.on { background: var(--navy); color: #fff; border-color: var(--navy); }
.savings-pill {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--green-l); color: #15803d;
  font-size: var(--t-xs); font-weight: 700;
  padding: 4px 11px; border-radius: 99px;
}

/* ─── Comparison row ─────────────────────────────────────────────── */
.inst-row {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-lg); margin-bottom: 8px;
  cursor: pointer; transition: all .2s cubic-bezier(.4,0,.2,1); overflow: hidden;
  max-width: 100%;
}
.inst-row:hover { box-shadow: var(--shadow); border-color: #c4d0e6; transform: translateY(-1px); }
.inst-row.featured { border-color: var(--blue); border-width: 1.5px; }
.inst-row.best-value { border-color: var(--green); border-width: 1.5px; }
.inst-row-top {
  display: grid;
  grid-template-columns: 52px 1fr 148px 156px 148px 172px;
  align-items: stretch; min-height: 82px;
}
@media(max-width:900px){ .inst-row-top { grid-template-columns: 44px 1fr 130px; } .metric-cell { display: none; } .inst-action { display: flex !important; } }
@media(max-width:560px){ .inst-row-top { grid-template-columns: 1fr; min-height: auto; } .rank-col { display: none; } }

.rank-col {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 0 0 0 4px; border-right: 1px solid var(--border-l);
}
.rank-n {
  font-family: 'Instrument Serif', serif; font-size: 22px;
  color: var(--text-4); line-height: 1;
}
.rank-col.r1 .rank-n { color: #d4a40a; }
.rank-col.r2 .rank-n { color: var(--text-3); }
.rank-col.r3 .rank-n { color: #a07940; }

.inst-info-col { padding: 16px 18px; border-right: 1px solid var(--border-l); display: flex; align-items: center; gap: 14px; }
.inst-avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid var(--border-l); }
.inst-name { font-size: var(--t-md); font-weight: 600; line-height: 1.3; margin-bottom: 3px; }
.inst-meta { font-size: var(--t-xs); color: var(--text-3); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.inst-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 7px; }
.verified-mark { color: var(--blue); font-size: var(--t-xs); font-weight: 600; display: flex; align-items: center; gap: 3px; }

.metric-cell {
  padding: 14px 16px; text-align: center; border-right: 1px solid var(--border-l);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.metric-n { font-family: 'Instrument Serif', serif; font-size: clamp(18px,2.2vw,24px); line-height: 1; margin-bottom: 4px; }
.metric-l { font-size: var(--t-xs); color: var(--text-3); text-transform: uppercase; letter-spacing: .05em; font-weight: 600; }
.metric-sub { font-size: var(--t-xs); color: var(--text-4); margin-top: 4px; }
.metric-cell.good .metric-n { color: var(--green); }
.metric-cell.fair .metric-n { color: var(--text-2); }
.metric-cell.warn .metric-n { color: var(--amber); }
.metric-cell.bad  .metric-n { color: var(--red); }
.metric-cell.accent .metric-n { color: var(--blue); }

.bench {
  display: inline-flex; align-items: center; padding: 2px 8px;
  border-radius: 4px; font-size: var(--t-xs); font-weight: 600; margin-top: 5px;
}
.bench-below { background: var(--green-l); color: #15803d; }
.bench-above { background: var(--red-l); color: var(--red); }
.bench-avg   { background: var(--border-l); color: var(--text-3); }

.inst-action {
  padding: 14px 16px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
}
.vscore-n {
  font-family: 'Instrument Serif', serif; font-size: 28px; line-height: 1;
  margin-bottom: 2px;
}
.vscore-bar { width: 80px; height: 4px; background: var(--border-l); border-radius: 99px; overflow: hidden; margin: 4px auto 10px; }
.vscore-fill { height: 100%; border-radius: 99px; transition: width .5s ease; }

/* ─── Row banner ─────────────────────────────────────────────────── */
.row-banner {
  padding: 5px 18px; font-size: var(--t-xs); font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase;
}
.row-banner-blue  { background: var(--blue); color: #fff; }
.row-banner-green { background: var(--green); color: #fff; }

/* ─── Expand panel ───────────────────────────────────────────────── */
.expand-panel {
  border-top: 1px solid var(--border-l);
  background: var(--off);
  padding: 22px 24px;
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 20px;
  animation: fadeIn .2s ease both;
}
@media(max-width:700px){ .expand-panel { grid-template-columns: 1fr 1fr; } }
.expand-section-title { font-size: var(--t-xs); font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }

/* Mini price chart */
.price-bars { display: flex; gap: 5px; align-items: flex-end; height: 40px; margin-bottom: 8px; }
.price-bar { flex: 1; border-radius: 3px 3px 0 0; background: var(--blue-l); min-height: 4px; transition: height .3s; }
.price-bar.latest { background: var(--blue); }

/* ─── Unlock gate ────────────────────────────────────────────────── */
.gate-wrap { position: relative; margin-bottom: 8px; overflow: hidden; }
.gate-blur { filter: blur(4px); pointer-events: none; user-select: none; }
.gate-panel {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  z-index: 10; text-align: center;
  background: var(--surface); border: 1px solid var(--border);

const Stars = ({ r }) => (
  <span className="stars">

const Bench = ({ rate, avg }) => {
  const d = rate - avg;
  if (d <= -3) return <span className="bench bench-below">↓ £{Math.abs(d)} below avg</span>;
  if (d >= 3)  return <span className="bench bench-above">↑ £{d} above avg</span>;
  return <span className="bench bench-avg">Near average</span>;
};

const Trend = ({ history }) => {
  if (!history || history.length < 2) return null;
  const d = history[history.length-1] - history[0];
  if (d === 0) return <span style={{fontSize:'var(--t-xs)',color:'var(--text-3)'}}>Stable over 4 weeks</span>;
  return d < 0
    ? <span style={{fontSize:'var(--t-xs)',color:'var(--green)',display:'flex',alignItems:'center',gap:4}}>{I.trendDown} £{Math.abs(d)} cheaper than 4 weeks ago</span>
    : <span style={{fontSize:'var(--t-xs)',color:'var(--red)',display:'flex',alignItems:'center',gap:4}}>{I.trending} £{d} more than 4 weeks ago</span>;
};

  const [verifiedOnly, setVerifiedOnly] = useState(false);

  const experience = searchParams?.experience || 'Complete Beginner';
  const postcode = searchParams?.postcode || 'Manchester';
  const hours = HOURS[experience] || 47;
  const regionAvg = REGION_AVG(postcode);

  const toggleSpec = s => setSpecialties(p => p.includes(s) ? p.filter(x=>x!==s) : [...p,s]);

  const results = useMemo(() => {
    let r = instructors.filter(i => {
      const tx = transmission==='Any'||i.transmissions.includes(transmission);
      const g  = gender==='Any'||i.gender===gender;
      const lt = lessonType==='Any'||i.lessonTypes.includes(lessonType);
      const vr = !verifiedOnly||i.verified;
      const pr = i.hourlyRate <= maxPrice;
      const sp = specialties.length===0||specialties.every(s=>i.specialties.includes(s));
      return tx && g && lt && vr && pr && sp;
    }).map(i => {
      const totalCost = i.hourlyRate * hours;
      const priceScore  = Math.max(0, Math.min(100, 100 - ((i.hourlyRate-20)/50)*100));
      const ratingScore = (i.rating/5)*100;
      const valueScore  = Math.round(priceScore*.4 + ratingScore*.3 + i.passRate*.3);
      return {...i, totalCost, valueScore};
    });
    switch(sortBy) {
      case 'price':  return r.sort((a,b)=>a.hourlyRate-b.hourlyRate);
      case 'total':  return r.sort((a,b)=>a.totalCost-b.totalCost);
      case 'pass':   return r.sort((a,b)=>b.passRate-a.passRate);
      case 'rating': return r.sort((a,b)=>b.rating-a.rating);
      default:       return r.sort((a,b)=>b.valueScore-a.valueScore);
    }
  }, [instructors, transmission, gender, lessonType, verifiedOnly, maxPrice, specialties, sortBy, hours]);

              const vColor = vScore>=85?'var(--green)':vScore>=70?'var(--blue)':vScore>=55?'var(--amber)':'var(--red)';
              const isExpanded = expanded === inst.id;
              const saving = results.length > 1 ? results[results.length-1].totalCost - inst.totalCost : 0;

                <div key={inst.id} className={`inst-row${isTop&&sortBy==='value'?' featured':''}`} onClick={() => !isLocked && setExpanded(isExpanded ? null : inst.id)}>

                    <span className="mob-metrics-wrap"><MobMetrics inst={inst} hours={hours} regionAvg={regionAvg}/></span>

                    <div className={`metric-cell ${priceCls}`}>
                      <div className="metric-n">£{inst.hourlyRate}</div>

                      <Bench rate={inst.hourlyRate} avg={regionAvg}/>

                    <div className={`metric-cell ${inst.passRate>=90?'good':inst.passRate>=80?'fair':'warn'}`}>

                      <div className="metric-l">pass rate</div>
                      <div className="metric-sub">UK avg: 47%</div>
                    </div>

                    <div className="inst-action">
                      <div style={{textAlign:'center'}}>
                        <div className="vscore-n" style={{color:vColor}}>{vScore}</div>

                      </div>
                      <button className="btn btn-primary btn-sm btn-full" onClick={e=>{e.stopPropagation();onBook(inst);}}>Book lesson</button>
                      <button className="btn btn-ghost btn-sm btn-full" onClick={e=>{e.stopPropagation();onViewProfile(inst.id);}}>Full profile</button>
                    </div>
                  </div>

                  {isExpanded && (
                    <div className="expand-panel">
                      <div>
                        <div className="expand-section-title">Price trend — 4 weeks</div>
                        <div className="price-bars">
                          {inst.priceHistory.map((p,i) => (
                            <div key={i} className={`price-bar${i===inst.priceHistory.length-1?' latest':''}`}
                              style={{height:`${((p-20)/50)*100}%`,minHeight:4}}/>
                          ))}
                        </div>
                        <Trend history={inst.priceHistory}/>
                      </div>
                      <div>
                        <div className="expand-section-title">Score breakdown</div>
                        {[
                          {l:'Price score',v:Math.round(Math.max(0,Math.min(100,100-((inst.hourlyRate-20)/50)*100)))},
                          {l:'Rating score',v:Math.round((inst.rating/5)*100)},
                          {l:'Pass rate',v:inst.passRate},
                        ].map(({l,v}) => (
                          <div key={l} style={{marginBottom:8}}>
                            <div style={{display:'flex',justifyContent:'space-between',fontSize:'var(--t-xs)',marginBottom:3}}>
                              <span style={{color:'var(--text-2)'}}>{l}</span>
                              <strong>{v}</strong>
                            </div>
                            <div className="prog"><div className="prog-fill" style={{width:`${v}%`}}/></div>
                          </div>
                        ))}
                      </div>
                      <div>
                        <div className="expand-section-title">Lesson types</div>
                        <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:14}}>
                          {inst.lessonTypes.map(l=><span key={l} className="chip chip-blue">{l}</span>)}
                        </div>
                        <div className="expand-section-title">Transmissions</div>
                        <div style={{display:'flex',gap:5}}>
                          {inst.transmissions.map(t=><span key={t} className="chip chip-gray">{t}</span>)}
                        </div>
                      </div>
                      <div>
                        <div className="expand-section-title">About</div>
                        <p style={{fontSize:'var(--t-xs)',color:'var(--text-2)',lineHeight:1.65,marginBottom:10}}>{inst.bio}</p>
                        {inst.specialties.length>0 && <>
                          <div className="expand-section-title">Specialist support</div>
                          <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                            {inst.specialties.map(s=><span key={s} className="chip chip-green">{s}</span>)}
                          </div>
                        </>}
                      </div>
                    </div>
                  )}
                </div>
              );

              if (isLocked) return (
                <div key={inst.id} className="gate-wrap">
                  <div className="gate-blur">{card}</div>
                  <div className="gate-panel">
                    <span style={{color:'var(--text-3)',display:'block',marginBottom:8}}>{I.lock}</span>
                    <h3>See all {results.length} instructors</h3>
                    <p style={{fontSize:'var(--t-sm)',color:'var(--text-2)',marginBottom:18,lineHeight:1.6}}>
                      Create a free account to unlock the full comparison and find a better deal.
                    </p>
                    <button className="btn btn-primary btn-full btn-lg" onClick={()=>onNav('learnerSignup')}>Compare all — free</button>
                    <p style={{fontSize:'var(--t-xs)',color:'var(--text-4)',marginTop:10}}>No credit card. Takes 30 seconds.</p>
                  </div>
                </div>
              );
              return card;
            })}

            {results.length > 0 && (
              <div className="callout callout-info" style={{marginTop:20}}>
                <strong>How we rank:</strong> Value Score = 40% price competitiveness + 30% rating + 30% pass rate. Premium-tier instructors are promoted in positions 1–3 when their value score is within 5 points of the next-ranked instructor. Pass rates are self-reported by instructors. Estimated total cost uses DVSA 2023 average hours data for each experience level.
              </div>
            )}
          </div>
        </div>
      </div>

    </>

};

const QuizSession = ({ quiz, onFinish }) => {
  const [idx, setIdx] = useState(0);
  const [sel, setSel] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const q = quiz.questions[idx];

  const answer = i => { if(answered)return; setSel(i); setAnswered(true); if(i===q.correct)setScore(s=>s+1); };
  const next = () => { if(idx<quiz.questions.length-1){setIdx(i=>i+1);setSel(null);setAnswered(false);}else setDone(true); };

  if (!q) return <div className="wrap" style={{paddingTop:40,textAlign:'center'}}>
    <p style={{color:'var(--text-2)'}}>No questions available for this topic yet.</p>
    <button className="btn btn-ghost" style={{marginTop:12}} onClick={()=>onFinish(0,0,quiz.topic)}>{I.arrowL} Back</button>
  </div>;

  if (done) {
    const pct = Math.round(score/quiz.questions.length*100);
    const c = pct>=75?'var(--green)':pct>=50?'var(--amber)':'var(--red)';
    return <div className="wrap" style={{paddingTop:40}}>
      <div className="card card-p" style={{maxWidth:460,margin:'0 auto',textAlign:'center',padding:48}}>
        <h2 className="serif" style={{fontSize:'var(--t-2xl)',fontWeight:400,marginBottom:6}}>Quiz complete</h2>
        <div className="serif" style={{fontSize:64,color:c,margin:'20px 0',lineHeight:1}}>{pct}%</div>
        <p style={{color:'var(--text-2)',fontSize:'var(--t-sm)'}}>{score} of {quiz.questions.length} correct</p>
        <div style={{display:'flex',gap:10,marginTop:28}}>
          <button className="btn btn-ghost btn-full" onClick={()=>onFinish(score,quiz.questions.length,quiz.topic)}>Back to hub</button>
          <button className="btn btn-primary btn-full" onClick={()=>{setIdx(0);setSel(null);setAnswered(false);setScore(0);setDone(false);}}>{I.refresh} Try again</button>
        </div>
      </div>
    </div>;
  }

  return <div className="wrap" style={{paddingTop:28,maxWidth:580,margin:'0 auto'}}>
    <div style={{display:'flex',justifyContent:'space-between',fontSize:'var(--t-xs)',color:'var(--text-3)',marginBottom:8}}>
      <span>Question {idx+1} of {quiz.questions.length}</span><span>{score} correct</span>
    </div>
    <div className="prog" style={{marginBottom:20}}><div className="prog-fill" style={{width:`${(idx/quiz.questions.length)*100}%`}}/></div>
    <div className="card card-p">
      <h2 className="serif" style={{fontSize:'var(--t-xl)',fontWeight:400,marginBottom:24,lineHeight:1.4}}>{q.text}</h2>
      {q.options.map((opt,i) => {
        let cls = 'q-option';
        if(answered&&i===q.correct) cls+=' correct';
        else if(answered&&i===sel) cls+=' wrong';
        return <button key={i} className={cls} onClick={()=>answer(i)} disabled={answered}>
          <span>{opt}</span>
          {answered&&i===q.correct&&<span style={{color:'var(--green)'}}>{I.check}</span>}
          {answered&&i===sel&&i!==q.correct&&<span style={{color:'var(--red)'}}>{I.x}</span>}
        </button>;
      })}
      {answered && <div className="callout callout-info" style={{marginTop:14}}><strong>Explanation: </strong>{q.explanation}</div>}
      <div style={{textAlign:'right',marginTop:18}}>
        <button className="btn btn-primary" onClick={next} disabled={!answered}>
          {idx<quiz.questions.length-1?'Next question':'Finish quiz'} {I.arrowR}
        </button>
      </div>
    </div>
  </div>;
};

  const r = 52, circ = 2*Math.PI*r, dash = circ*(p.theoryProgress/100);
  return <div className="wrap" style={{paddingTop:28,paddingBottom:48}}>
    <h1 className="serif" style={{fontSize:'var(--t-2xl)',fontWeight:400,marginBottom:4}}>Your progress</h1>
    <p style={{color:'var(--text-2)',marginBottom:28,fontSize:'var(--t-sm)'}}>Keep going — you're on track to pass.</p>
    <div className="grid-3" style={{marginBottom:24}}>
      {[{l:'Lessons completed',v:p.lessonsCompleted,c:'var(--blue)'},{l:'Average saving',v:`£${p.averageSavings}/hr`,c:'var(--green)'},{l:'Pass readiness',v:`${p.passLikelihood}%`,c:'var(--amber)'}].map(({l,v,c})=>(
        <div key={l} className="card dash-metric">
          <div style={{fontSize:'var(--t-xs)',color:'var(--text-3)'}}>{l}</div>
          <div className="dash-metric-n" style={{color:c}}>{v}</div>
        </div>
      ))}
    </div>
    <div className="grid-2">
      <div className="card card-p" style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
        <h3 style={{fontWeight:600,marginBottom:18,alignSelf:'flex-start'}}>Theory progress</h3>
        <div className="circ-wrap" style={{width:130,height:130}}>
          <svg width="130" height="130" viewBox="0 0 130 130" style={{transform:'rotate(-90deg)'}}>
            <circle cx="65" cy="65" r={r} fill="none" stroke="var(--border-l)" strokeWidth="9"/>
            <circle cx="65" cy="65" r={r} fill="none" stroke="var(--blue)" strokeWidth="9" strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" style={{transition:'stroke-dasharray .5s ease'}}/>
          </svg>
          <span className="circ-label serif" style={{fontSize:26}}>{p.theoryProgress}%</span>
        </div>
        <p style={{color:'var(--green)',fontWeight:600,marginTop:10,fontSize:'var(--t-sm)'}}>Up {p.scoreTrend}% this week</p>
        <button className="btn btn-primary btn-full" style={{marginTop:16}} onClick={()=>onNav('theoryPractice')}>Continue studying</button>
      </div>
      <div className="card card-p">
        <h3 style={{fontWeight:600,marginBottom:14}}>Recommended topics</h3>
        {p.recommendedTopics.map(t=>(
          <div key={t} style={{padding:'10px 14px',background:'var(--off)',borderRadius:'var(--r)',fontSize:'var(--t-sm)',fontWeight:500,marginBottom:8,color:'var(--text-2)'}}>{t}</div>
        ))}
        <div style={{marginTop:20}}>
          <h3 style={{fontWeight:600,marginBottom:14}}>Badges</h3>
          <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
            {p.badges.map(b=>(
              <div key={b.name} style={{textAlign:'center',width:54}}>
                <div style={{width:44,height:44,background:'var(--amber-l)',borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--amber)',margin:'0 auto'}}>{b.icon}</div>
                <div style={{fontSize:'var(--t-xs)',color:'var(--text-3)',marginTop:5,lineHeight:1.3}}>{b.name}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  </div>;
};

// ─── INSTRUCTOR INFO PAGE ────────────────────────────────────────────────────

// ─── PRIVACY PAGE ────────────────────────────────────────────────────────────

  <div className="wrap-sm" style={{paddingTop:28,paddingBottom:48}}>
    <button className="btn btn-ghost btn-sm" onClick={onBack} style={{marginBottom:20}}>{I.arrowL} Back</button>
    <div className="card card-p-lg">
      <h1 className="serif" style={{fontSize:'var(--t-2xl)',fontWeight:400,marginBottom:20}}>Privacy & Cookie Policy</h1>
      <div style={{lineHeight:1.8,color:'var(--text-2)',fontSize:'var(--t-sm)'}}>
        {[
          {h:'Data we collect',t:'Name, email, postcode, driving preferences, and support needs. Support needs (including ADHD, autism, hearing impairment, and physical disability) are classified as special category data under UK GDPR Article 9 and are collected under explicit consent, used solely for instructor matching.'},
          {h:'Your rights (UK GDPR)',t:'You have the right to access, correct, delete, and port your personal data. You may also object to processing. Contact privacy@passpal.ai to exercise any of these rights.'},
          {h:'Cookies',t:'We use essential cookies for core functionality. Analytics cookies are only placed with your explicit consent via the cookie banner.'},
          {h:'Data controller',t:'PassPal AI Ltd · privacy@passpal.ai · ICO registration pending. We comply with UK GDPR and the Data Protection Act 2018.'},
        ].map(({h,t})=>(

            <p>{t}</p>

);

// ─── APP ────────────────────────────────────────────────────────────────────
const App = () => {
  const [view, setView]           = useState('home');
  const [instructors, setInst]    = useState(INSTRUCTORS);
  const [learners, setLearners]   = useState(LEARNERS);
  const [selectedId, setSelId]    = useState(null);
  const [searchParams, setSP]     = useState(null);
  const [learnerUser, setLU]      = useState(null);
  const [instUser, setIU]         = useState(null);
  const [adminRole, setAdmin]     = useState(null);
  const [bookInst, setBookInst]   = useState(null);
  const [topics, setTopics]       = useState(THEORY);
  const [progress, setProgress]   = useState(PROGRESS_DATA);
  const [quiz, setQuiz]           = useState(null);
  const [cookie, setCookie]       = useState(() => localStorage.getItem('pp_cookie'));
  const [logoClicks, setLC]       = useState(0);

  const nav = useCallback(v => {
    window.scrollTo(0, 0);
    if (v === 'dashboard' && !learnerUser) { setView('learnerLogin'); return; }
    setView(v);
  }, [learnerUser]);

  const handleSearch = params => { setSP(params); setView('compare'); };

  const render = () => {
    if (adminRole && view === 'adminDashboard') return (
      <AdminDashboard instructors={instructors} learners={learners}
        onApprove={id => setInst(p => p.map(i => i.id===id ? {...i,verified:true} : i))}
        onLogout={() => { setAdmin(null); nav('home'); }}/>
    );
    if (view === 'adminLogin') return <AdminLogin onLogin={()=>{setAdmin('SuperAdmin');setView('adminDashboard');}}/>;

    switch (view) {
      case 'home':     return <Home onNav={nav} onSearch={handleSearch}/>;
      case 'compare':  return <ComparisonPage instructors={instructors} searchParams={searchParams} isGuest={!learnerUser} onNav={nav} onViewProfile={id=>{setSelId(id);setView('profile');}} onBook={i=>setBookInst(i)}/>;
      case 'profile':  { const i=instructors.find(x=>x.id===selectedId); return i ? <InstructorProfile instructor={i} experience={searchParams?.experience} postcode={searchParams?.postcode} onBack={()=>setView('compare')} onBook={i=>setBookInst(i)}/> : <Home onNav={nav} onSearch={handleSearch}/>; }
      case 'theoryPractice': return <TheoryPractice topics={topics} mockLeft={progress.mockAttemptsLeft} onStartQuiz={t=>{setQuiz(t==='mock'?{topic:'mock',questions:MOCK_QS.slice(0,10)}:{topic:t,questions:t.questions});setView('quiz');}}/>;
      case 'quiz':     return quiz ? <QuizSession quiz={quiz} onFinish={(s,tot,t)=>{if(t!=='mock')setTopics(p=>p.map(x=>x.id===t.id?{...x,progress:Math.max(x.progress,Math.round(s/tot*100))}:x));setProgress(p=>({...p,mockAttemptsLeft:t==='mock'?p.mockAttemptsLeft-1:p.mockAttemptsLeft}));setQuiz(null);setView('theoryPractice');}}/> : <TheoryPractice topics={topics} mockLeft={progress.mockAttemptsLeft} onStartQuiz={()=>{}}/>;
      case 'dashboard':       return learnerUser ? <LearnerDashboard progress={progress} topics={topics} onNav={nav}/> : <LearnerLogin onLogin={u=>{setLU(u);nav('home');}} onNav={nav}/>;
      case 'learnerLogin':    return <LearnerLogin onLogin={u=>{setLU(u);nav('home');}} onNav={nav}/>;
      case 'learnerSignup':   return <LearnerSignup onSignup={(name,email)=>{const u={...LEARNERS[0],id:99,name,email};setLearners(p=>[...p,u]);setLU(u);nav('compare');}} onNav={nav}/>;
      case 'instructorInfo':  return <InstructorInfoPage onNav={nav}/>;
      case 'instructorLogin': return <InstructorLogin instructors={instructors} onLogin={i=>{setIU(i);nav('instructorPortal');}} onNav={nav}/>;
      case 'instructorPortal':return instUser ? <InstructorPortal instructor={instUser} onUpdate={u=>{setInst(p=>p.map(i=>i.id===u.id?u:i));setIU(u);}} onLogout={()=>{setIU(null);nav('home');}}/> : <InstructorLogin instructors={instructors} onLogin={i=>{setIU(i);nav('instructorPortal');}} onNav={nav}/>;
      case 'privacyPolicy':   return <PrivacyPage onBack={()=>nav('home')}/>;
      default:                return <Home onNav={nav} onSearch={handleSearch}/>;
    }
  };

  const isFullscreen = ['instructorPortal','adminDashboard'].includes(view) && (instUser || adminRole);

  return (
    <>
      <Header view={view} onNav={nav} learner={learnerUser} onLogout={()=>{setLU(null);nav('home');}} instructor={instUser} onInstLogout={()=>{setIU(null);nav('home');}} logoClicks={logoClicks} setLogoClicks={setLC}/>
      <div className="page-wrap page-bottom-safe" key={view}>{render()}</div>
      {!isFullscreen && (
        <footer style={{borderTop:'1px solid var(--border)',padding:'20px 24px',textAlign:'center',fontSize:'var(--t-xs)',color:'var(--text-4)',marginTop:48}}>
          <div className="wrap" style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
            <span>© {new Date().getFullYear()} PassPal AI Ltd. All rights reserved.</span>
            <div style={{display:'flex',gap:16}}>
              <button onClick={()=>nav('privacyPolicy')} style={{background:'none',border:'none',color:'var(--blue)',cursor:'pointer',fontSize:'var(--t-xs)'}}>Privacy & Cookies</button>
              <span>Comparison methodology disclosed below each result set.</span>
            </div>
          </div>
        </footer>
      )}
      {bookInst && <BookingModal instructor={bookInst} onClose={()=>setBookInst(null)}/>}
      {!cookie && (
        <div className="cookie-bar">
          <p className="cookie-text">We use cookies to improve your comparison experience. <button onClick={()=>nav('privacyPolicy')} style={{background:'none',border:'none',color:'rgba(255,255,255,.5)',cursor:'pointer',fontSize:'inherit',textDecoration:'underline'}}>Privacy policy</button></p>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-ghost btn-sm" style={{color:'rgba(255,255,255,.5)',borderColor:'rgba(255,255,255,.15)'}} onClick={()=>{setCookie('d');localStorage.setItem('pp_cookie','d');}}>Decline</button>
            <button className="btn btn-primary btn-sm" onClick={()=>{setCookie('a');localStorage.setItem('pp_cookie','a');}}>Accept</button>
          </div>
        </div>
      )}
    </>
  );
};


// ─── MOBILE TAB BAR ────────────────────────────────────────────────
const MobTabBar = ({ view, onNav, learnerUser, instUser }) => {
  const tabs = [
    {v:'home',l:'Home',icon:<Svg size={20}><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></Svg>},
    {v:'compare',l:'Compare',icon:<Svg size={20}><path d="M18 20V10M12 20V4M6 20v-6"/></Svg>},
    {v:'theoryPractice',l:'Theory',icon:<Svg size={20}><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></Svg>},
    {v:learnerUser?'dashboard':instUser?'instructorPortal':'learnerLogin',
     l:learnerUser||instUser?'Account':'Sign in',
     icon:<Svg size={20}><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></Svg>},
  ];
  return <div className="mob-tab-bar">
    {tabs.map(({v,l,icon}) => (
      <button key={v} className={`mob-tab-item${view===v?' on':''}`} onClick={()=>onNav(v)}>
        {icon}<span>{l}</span>
      </button>
    ))}
  </div>;
};

// ─── MOBILE METRIC STRIP (injected inside inst-row on mobile) ──────
const MobMetrics = ({ inst, hours, regionAvg }) => {
  const totalCost = inst.hourlyRate * hours;
  const priceCls = inst.hourlyRate <= regionAvg-3 ? 'good' : inst.hourlyRate >= regionAvg+3 ? 'bad' : 'warn';
  const vScore = inst.valueScore || Math.round(Math.max(0,Math.min(100,100-((inst.hourlyRate-20)/50)*100))*.4 + (inst.rating/5)*100*.3 + inst.passRate*.3);
  const vColor = vScore>=85?'var(--green)':vScore>=70?'var(--blue)':vScore>=55?'var(--amber)':'var(--red)';
  return <div className="mob-metrics">
    <div className="mob-metric">
      <div className={`mob-metric-n ${priceCls}`}>£{inst.hourlyRate}</div>
      <div className="mob-metric-l">per hour</div>
    </div>
    <div style={{width:1,background:'var(--border-l)',margin:'4px 0'}}/>
    <div className="mob-metric">
      <div className="mob-metric-n accent">£{totalCost.toLocaleString()}</div>
      <div className="mob-metric-l">est. total</div>
    </div>
    <div style={{width:1,background:'var(--border-l)',margin:'4px 0'}}/>
    <div className="mob-metric">
      <div className={`mob-metric-n ${inst.passRate>=90?'good':inst.passRate>=80?'accent':'warn'}`}>{inst.passRate}%</div>
      <div className="mob-metric-l">pass rate</div>
    </div>
    <div style={{width:1,background:'var(--border-l)',margin:'4px 0'}}/>
    <div className="mob-metric">
      <div className="mob-metric-n vscore" style={{color:vColor}}>{vScore}</div>
      <div className="mob-metric-l">value</div>
    </div>
  </div>;
};
ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
